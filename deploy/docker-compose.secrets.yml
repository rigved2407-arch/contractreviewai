version: "3.9"

# Docker secrets override — mount sensitive values from local files.
#
# Usage:
#   1. Create .secrets/ directory with one file per secret:
#        mkdir -p .secrets
#        echo "sk-..." > .secrets/OPENAI_API_KEY
#        echo "..."    > .secrets/JWT_SECRET
#        echo "..."    > .secrets/ENCRYPTION_KEY
#        echo "..."    > .secrets/SMTP_PASSWORD
#   2. Deploy with this override:
#        docker-compose -f docker-compose.yml -f deploy/docker-compose.secrets.yml up -d
#   3. NEVER commit the .secrets/ directory.
#
# Each secret is mounted at /run/secrets/<secret_name> inside the container.
# The app's config.py reads from /run/secrets/ as fallback after env vars.

secrets:
  openai_api_key:
    file: .secrets/OPENAI_API_KEY
  encryption_key:
    file: .secrets/ENCRYPTION_KEY
  api_key:
    file: .secrets/API_KEY
  jwt_secret:
    file: .secrets/JWT_SECRET
  smtp_user:
    file: .secrets/SMTP_USER
  smtp_password:
    file: .secrets/SMTP_PASSWORD
  sentry_dsn:
    file: .secrets/SENTRY_DSN
  azure_openai_key:
    file: .secrets/AZURE_OPENAI_KEY

services:
  backend:
    secrets:
      - openai_api_key
      - encryption_key
      - api_key
      - jwt_secret
      - smtp_user
      - smtp_password
      - sentry_dsn
      - azure_openai_key
