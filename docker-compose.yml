version: "3.9"

x-common-env: &common-env
  ENCRYPT_DOCUMENTS: ${ENCRYPT_DOCUMENTS:-true}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
  AUTH_ENABLED: ${AUTH_ENABLED:-true}
  API_KEY: ${API_KEY:-}
  AUDIT_ENABLED: ${AUDIT_ENABLED:-true}
  DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-365}
  DPDP_COMPLIANCE: ${DPDP_COMPLIANCE:-true}
  DATA_RESIDENCY: ${DATA_RESIDENCY:-india}
  LLM_DATA_LOGGING: ${LLM_DATA_LOGGING:-false}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  JWT_SECRET: ${JWT_SECRET:-}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
  APP_URL: ${APP_URL:-http://localhost:3000}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@contractreviewai.com}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Contract Review AI}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/contract_review.db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-llama-3.3-70b-versatile}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      STORAGE_DIR: ${STORAGE_DIR:-/data/storage}
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  app_data:
