{% extends "base.html" %}
{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
  <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center text-3xl mb-6">⚠️</div>
  <h1 class="text-2xl font-bold text-slate-900 mb-2">{{ title|default("Error") }}</h1>
  <p class="text-slate-500 mb-6">{{ message|default("An unexpected error occurred.") }}</p>
  <a href="/" class="px-5 py-2.5 bg-gradient-to-r from-brand-600 to-brand-700 text-white rounded-xl text-sm font-medium hover:from-brand-700 hover:to-brand-800 transition-all shadow-md">
    Go Home
  </a>
</div>
{% endblock %}
