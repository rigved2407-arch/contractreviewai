{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto">
  <a href="/dpdp/privacy" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 mb-5 transition-colors group">
    <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back to Privacy Notice
  </a>

  <h1 class="text-2xl font-bold text-slate-900 mb-2">Data Subject Request</h1>
  <p class="text-sm text-slate-500 mb-8">Exercise your rights under the DPDP Act, 2023</p>

  <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6">
    <form action="/dpdp/data-request" method="post" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Request Type</label>
        <select name="request_type" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500">
          <option value="access" {% if request.query_params.type == 'access' %}selected{% endif %}>Access my personal data</option>
          <option value="correction" {% if request.query_params.type == 'correction' %}selected{% endif %}>Correct my personal data</option>
          <option value="erasure" {% if request.query_params.type == 'erasure' %}selected{% endif %}>Erase my personal data</option>
          <option value="grievance" {% if request.query_params.type == 'grievance' %}selected{% endif %}>File a grievance</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Full Name</label>
        <input type="text" name="principal_name" required class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500" placeholder="e.g. Rajesh Kumar">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email Address</label>
        <input type="email" name="principal_email" required class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500" placeholder="e.g. rajesh@lawfirm.com">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description</label>
        <textarea name="description" rows="4" required class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500" placeholder="Describe your request in detail..."></textarea>
      </div>
      <div class="p-3 bg-amber-50 rounded-xl border border-amber-200 text-xs text-amber-800">
        <p class="font-medium">Under Section 12 of the DPDP Act, 2023:</p>
        <p class="mt-1">We will acknowledge your request within 7 days and resolve it within 30 days from the date of receipt.</p>
      </div>
      <button type="submit" class="w-full py-3 bg-gradient-to-r from-brand-600 to-brand-700 text-white rounded-xl text-sm font-semibold hover:from-brand-700 hover:to-brand-800 transition-all shadow-md">
        Submit Request
      </button>
    </form>
  </div>
</div>
{% endblock %}
